faq:
  title: Frequently Asked Questions
  description: A little more about my current work and interests.
  categories:
    - title: Current Work
      questions:
        - label: What are you working on now?
          content: |
            I'm focused full-time on [Qleer](https://qleer.ai), where I'm Co-founder and CTO. We build AI software that helps professionals in the Testing, Inspection & Certification industry analyze technical documentation and generate conformity reports more efficiently.
        - label: Are you available for client work or job opportunities?
          content: |
            No. I'm fully committed to Qleer and don't accept freelance projects, consulting engagements, retainers, or job opportunities.
        - label: What happened to SWAI Agency?
          content: |
            I closed SWAI Agency in 2026 to focus entirely on Qleer. Building the agency taught me a lot about product development, AI automation, and working closely with businesses, and those lessons now shape how I build at Qleer.
    - title: Projects & Community
      questions:
        - label: What happened to SupaCodeur?
          content: |
            SupaCodeur is closed. It began as an internal tool for automating my freelance prospecting and later became a niche SaaS product. The project is no longer active, but I keep its story on this site as an honest case study about building and growing a product.
        - label: Do you still work on side projects?
          content: |
            Occasionally, when time allows. They are experiments for learning and curiosity rather than commercial services. My professional priority remains Qleer.
        - label: Do you contribute to open source?
          content: |
            Yes. I contribute to tools I use and admire, including Nuxt, Supabase, and Cal.com. My public pull requests are available on [GitHub](https://prs.valentinchmara.com).
    - title: About Me
      questions:
        - label: What do you enjoy most about your work?
          content: |
            I love the challenge of solving complex problems through design and technology. It's incredibly rewarding to see people interact with something I've created and find it genuinely useful and easy to navigate. Bridging the gap between user needs and technical possibilities is what truly excites me.
        - label: What are your hobbies outside of work?
          content: |
            When I'm not coding or building a SaaS, I enjoy spending time with my family and friends, playing video games, and exploring new technologies. I also love to travel and experience different cultures. Additionally, I like to stay active by hiking and montainering. And of course, I love to give back to the community, so I'm trying to contribute to open-source projects as much as possible!
